<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | Varsity Market</title>
    <style>
        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f4f4f4;
            --text-main: #121212;
            --text-muted: #6a6a6a;
            --accent: #007bff; /* Enterprise Blue */
            --border-color: #e0e0e0;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Collection Grid */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .collection-card {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background: var(--secondary-bg);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .collection-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow);
        }

        .image-wrapper {
            aspect-ratio: 4 / 5;
            overflow: hidden;
            background-color: #eee;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .collection-card:hover .image-wrapper img {
            transform: scale(1.05);
        }

        .collection-info {
            padding: 20px;
            background: #fff;
            border-top: 1px solid var(--border-color);
        }

        .collection-info h2 {
            font-size: 1.25rem;
            margin: 0 0 5px 0;
            font-weight: 600;
        }

        .collection-info span {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .cta-link {
            display: inline-block;
            margin-top: 15px;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .cta-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .collection-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Our Collections</h1>
        <p>Curated selections for the varsity lifestyle.</p>
    </header>

    <main class="collection-grid">
        <article class="collection-card">
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&w=800&q=80" alt="Apparel Collection">
            </div>
            <div class="collection-info">
                <span>Shop All</span>
                <h2>Varsity Apparel</h2>
                <a href="#" class="cta-link">View Products &rarr;</a>
            </div>
        </article>

        <article class="collection-card">
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1583394838336-acd977730f90?auto=format&fit=crop&w=800&q=80" alt="Accessories Collection">
            </div>
            <div class="collection-info">
                <span>Trending</span>
                <h2>Tech & Accessories</h2>
                <a href="#" class="cta-link">View Products &rarr;</a>
            </div>
        </article>

        <article class="collection-card">
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&w=800&q=80" alt="Stationery Collection">
            </div>
            <div class="collection-info">
                <span>Essentials</span>
                <h2>Study & Stationery</h2>
                <a href="#" class="cta-link">View Products &rarr;</a>
            </div>
        </article>
    </main>
</div>

</body>
</html>
