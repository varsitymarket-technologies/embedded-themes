<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Library | Varsity Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: #a855f7; /* Purple-500 */
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.15);
            transform: translateY(-4px);
        }

        .purple-gradient-text {
            background: linear-gradient(135deg, #a855f7 0%, #d8b4fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-gray-100 antialiased">

    <nav class="border-b border-gray-800 px-8 py-4 flex justify-between items-center bg-[#0a0a0a]">
        <div class="flex items-center space-x-4">
            <img style="max-width:5rem;" src="../assets/favicon.png">
        </div>
        <div class="flex items-center space-x-4">

                            <div class="quick_links">
                            </div>
                            <div>
                                <h2 onclick="openmenu()" style="padding-top:20px; ">
                                    <img style="height: 2rem; width: auto;" src="../assets/menu-active.png">
                                </h2>
                            </div>
        </div>
                                  
    </nav>

    <div class="container mx-auto px-6 py-12">
        <header class="mb-12">
            <h1 class="text-4xl font-bold mb-4">Template <span class="purple-gradient-text">Collections</span></h1>
            <p class="text-gray-400 max-w-2xl">Browse and deploy enterprise-grade store layouts. Designed for performance, accessibility, and high conversion.</p>
        </header>

        <div class="flex flex-col md:flex-row gap-4 mb-10">
            <input type="text" placeholder="Search templates..." class="bg-[#111] border border-gray-800 rounded-lg px-4 py-2.5 w-full md:w-96 focus:outline-none focus:border-purple-500 transition">
            <div class="flex gap-2">
                <button class="px-4 py-2 bg-purple-900/30 text-purple-400 border border-purple-500/30 rounded-lg text-sm">All</button>
                <button class="px-4 py-2 bg-[#111] text-gray-400 border border-gray-800 rounded-lg text-sm hover:border-gray-600">E-Commerce</button>
                <button class="px-4 py-2 bg-[#111] text-gray-400 border border-gray-800 rounded-lg text-sm hover:border-gray-600">Portfolio</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="glass-card rounded-xl overflow-hidden group">
                <div class="h-48 bg-[#1a1a1a] relative overflow-hidden" style="background-image: url(https://raw.githubusercontent.com/varsitymarket-technologies/embedded-themes/refs/heads/main/collection/hastings.ego/poster.png);background-size: cover;height: 20rem;">
                    
                    
                </div>
                <div class="p-5 border-t border-gray-800">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-semibold text-lg">hastings.ego</h3>
                        <span class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded border border-blue-500/20">NEW</span>
                    </div>
                    <p class="text-sm text-gray-500 mb-6">Great Template For Your Upcomming Brands.</p>
                    <div class="flex items-center justify-between">
                        <div class="flex space-x-2">
                            <span class="text-xs text-gray-500 bg-gray-900 px-2 py-1 rounded">Eccomerce</span>
                            <span class="text-xs text-gray-500 bg-gray-900 px-2 py-1 rounded">Minimalistic</span>
                        </div>
                        <a href="hastings.ego/" target="_blank" class="text-purple-400 hover:text-purple-300 text-sm font-medium">View Template →</a>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-xl overflow-hidden group">
                <div class="h-48 bg-[#1a1a1a] relative overflow-hidden" style="background-image: url(https://raw.githubusercontent.com/varsitymarket-technologies/embedded-themes/refs/heads/main/collection/default/poster.png);background-size: cover;height: 20rem;">
                    
                    
                </div>
                <div class="p-5 border-t border-gray-800">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-semibold text-lg">Default</h3>
                    </div>
                    <p class="text-sm text-gray-500 mb-6">Default Web Page.</p>
                    <div class="flex items-center justify-between">
                        <div class="flex space-x-2">
                            <span class="text-xs text-gray-500 bg-gray-900 px-2 py-1 rounded">Coming Soon</span>
                        </div>
                        <a href="default/" target="_blank" class="text-purple-400 hover:text-purple-300 text-sm font-medium">View Template →</a>
                    </div>
                </div>
            </div>

            

        </div>
    </div>

</body>
</html>
