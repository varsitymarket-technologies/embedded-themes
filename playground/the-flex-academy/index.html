<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fenix Academy | Minimalist Education</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .active-link {
            color: #ea580c;
            border-bottom: 2px solid #ea580c;
        }

        [v-cloak] {
            display: none;
        }
    </style>
</head>

<body class="bg-white text-slate-900">

    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md border-b border-slate-100 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="navigate('home')">
                    <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 10L20 80H80L50 10Z" fill="#ea580c" fill-opacity="0.1" />
                        <path d="M50 15L85 90H15L50 15Z" stroke="#ea580c" stroke-width="4" stroke-linejoin="round" />
                        <path d="M50 30V60M40 50H60" stroke="#ea580c" stroke-width="4" stroke-linecap="round" />
                    </svg>
                    <span class="text-xl font-bold tracking-tighter text-slate-900">FENIX<span
                            class="text-orange-600">ACADEMY</span></span>
                </div>

                <div class="hidden md:flex space-x-8 text-sm font-semibold uppercase tracking-widest">
                    <a onclick="navigate('home')"
                        class="nav-link cursor-pointer hover:text-orange-600 transition">Home</a>
                    <a onclick="navigate('resources')"
                        class="nav-link cursor-pointer hover:text-orange-600 transition">Resources</a>
                    <a onclick="navigate('services')"
                        class="nav-link cursor-pointer hover:text-orange-600 transition">Services</a>
                    <a onclick="navigate('about')"
                        class="nav-link cursor-pointer hover:text-orange-600 transition">About</a>
                    <a onclick="navigate('contact')"
                        class="nav-link cursor-pointer hover:text-orange-600 transition">Contact</a>
                </div>

                <div class="flex items-center gap-4">
                    <a onclick="navigate('dashboard')"
                        class="hidden sm:block text-sm font-bold bg-slate-900 text-white px-6 py-3 rounded-full hover:bg-orange-600 transition cursor-pointer">Student
                        Portal</a>
                    <button class="md:hidden p-2" onclick="toggleMobileMenu()">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-100 px-4 py-4 space-y-4">
            <a onclick="navigate('home')" class="block font-semibold">Home</a>
            <a onclick="navigate('resources')" class="block font-semibold">Resources</a>
            <a onclick="navigate('services')" class="block font-semibold">Services</a>
            <a onclick="navigate('about')" class="block font-semibold">About</a>
            <a onclick="navigate('contact')" class="block font-semibold">Contact</a>
            <a onclick="navigate('dashboard')" class="block font-semibold text-orange-600">Portal</a>
        </div>
    </nav>

    <main id="view" class="pt-24 min-h-screen">
    </main>

    <footer class="bg-slate-50 py-12 border-t border-slate-100">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-400 text-sm tracking-widest uppercase">&copy; 2026 The Fenix Academy. Rise from the
                mundane.</p>
        </div>
    </footer>

    <template id="page-home">
        <section class="max-w-7xl mx-auto px-4 py-20 text-center">
            <h1 class="text-6xl md:text-8xl font-bold tracking-tight mb-8">Rise to <br><span
                    class="text-orange-600">Excellence.</span></h1>
            <p class="text-xl text-slate-500 max-w-2xl mx-auto mb-12">Minimalist academic support for the modern
                scholar. Premium resources, late-night mastery, and homework clarity.</p>
            <div class="flex justify-center gap-6">
                <button onclick="navigate('resources')"
                    class="bg-orange-600 text-white px-8 py-4 rounded-full font-bold shadow-xl shadow-orange-200 hover:scale-105 transition">Explore
                    Resources</button>
                <button onclick="navigate('about')"
                    class="border-2 border-slate-200 px-8 py-4 rounded-full font-bold hover:bg-slate-50 transition">Our
                    Story</button>
            </div>
        </section>
    </template>

    <template id="page-resources">
        <section class="max-w-7xl mx-auto px-4 py-12">
            <div class="mb-12">
                <h2 class="text-4xl font-bold">Library</h2>
                <p class="text-slate-500">Curated materials for academic success.</p>
            </div>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="group border border-slate-100 p-6 rounded-3xl hover:shadow-2xl hover:shadow-slate-100 transition cursor-pointer"
                    onclick="navigate('product')">
                    <div class="aspect-square bg-slate-50 rounded-2xl mb-4 flex items-center justify-center">
                        <span class="text-4xl text-slate-200">PDF</span>
                    </div>
                    <h3 class="text-xl font-bold">Calculus Mastery Pack</h3>
                    <p class="text-orange-600 font-bold">$19.00</p>
                </div>
            </div>
        </section>
    </template>

    <template id="page-services">
        <section class="max-w-7xl mx-auto px-4 py-12">
            <h2 class="text-4xl font-bold mb-12 text-center">Specialized Support</h2>
            <div class="grid md:grid-cols-2 gap-12">
                <div class="bg-slate-900 text-white p-12 rounded-[3rem]">
                    <h3 class="text-3xl font-bold mb-4">Late-Night Classes</h3>
                    <p class="text-slate-400 mb-8">Intensity for night owls. Every Tuesday & Thursday from 20:00 to
                        00:00.</p>
                    <button class="bg-white text-slate-900 px-8 py-3 rounded-full font-bold">Book a Slot</button>
                </div>
                <div class="bg-orange-50 p-12 rounded-[3rem]">
                    <h3 class="text-3xl font-bold mb-4 text-orange-950">Homework Assist</h3>
                    <p class="text-orange-800/60 mb-8">Upload your prompt, receive a guided video explanation within 2
                        hours.</p>
                    <button class="bg-orange-600 text-white px-8 py-3 rounded-full font-bold">Send Task</button>
                </div>
            </div>
        </section>
    </template>

    <template id="page-about">
        <section class="max-w-4xl mx-auto px-4 py-20 text-center">
            <h2 class="text-5xl font-bold mb-8">We believe every student can <span
                    class="text-orange-600">reignite</span> their passion.</h2>
            <p class="text-lg text-slate-600 leading-relaxed">The Fenix Academy was founded on the principle that
                academic struggle is just the ash from which great minds rise. We strip away the clutter of traditional
                tutoring to provide direct, effective, and modern education.</p>
        </section>
    </template>

    <template id="page-contact">
        <section class="max-w-xl mx-auto px-4 py-20">
            <h2 class="text-4xl font-bold mb-8">Talk to us</h2>
            <form class="space-y-6">
                <div><label class="block text-xs font-bold uppercase mb-2">Name</label><input type="text"
                        class="w-full bg-slate-50 border-none rounded-xl p-4"></div>
                <div><label class="block text-xs font-bold uppercase mb-2">Email</label><input type="email"
                        class="w-full bg-slate-50 border-none rounded-xl p-4"></div>
                <div><label class="block text-xs font-bold uppercase mb-2">Message</label><textarea
                        class="w-full bg-slate-50 border-none rounded-xl p-4 h-32"></textarea></div>
                <button type="button" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl">Send
                    Inquiry</button>
            </form>
        </section>
    </template>

    <template id="page-dashboard">
        <section class="max-w-7xl mx-auto px-4 py-12">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-3xl font-bold">Portal</h2>
                    <p class="text-slate-500">Welcome back, Scholar.</p>
                </div>
                <div class="text-right">
                    <span class="text-xs font-bold uppercase text-slate-400">Current Status</span>
                    <p class="text-green-600 font-bold">Active Member</p>
                </div>
            </div>
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    <div class="bg-slate-50 p-8 rounded-3xl">
                        <h4 class="font-bold mb-4">My Resources</h4>
                        <div class="space-y-2">
                            <div class="flex justify-between p-4 bg-white rounded-xl"><span>Physics Exam
                                    Prep</span><span class="text-orange-600">Download</span></div>
                            <div class="flex justify-between p-4 bg-white rounded-xl"><span>Algebra Cheat
                                    Sheet</span><span class="text-orange-600">Download</span></div>
                        </div>
                    </div>
                </div>
                <div class="bg-slate-900 text-white p-8 rounded-3xl h-fit">
                    <h4 class="font-bold mb-4">Schedule</h4>
                    <p class="text-slate-400 text-sm mb-6">Next Late-Night Class: Tuesday 21:00</p>
                    <button class="w-full border border-slate-700 py-3 rounded-xl hover:bg-slate-800 transition">Join
                        Session</button>
                </div>
            </div>
        </section>
    </template>

    <template id="page-product">
        <section class="max-w-7xl mx-auto px-4 py-20 flex flex-col md:flex-row gap-12">
            <div class="flex-1 aspect-square bg-slate-50 rounded-[3rem]"></div>
            <div class="flex-1">
                <h2 class="text-4xl font-bold mb-4">The Calculus Mastery Pack</h2>
                <p class="text-3xl text-orange-600 font-bold mb-6">$19.00</p>
                <p class="text-slate-600 mb-8 leading-relaxed">A comprehensive guide covering Limits, Derivatives, and
                    Integrals with 50+ solved examples and practice mock tests.</p>
                <button class="w-full bg-slate-900 text-white py-4 rounded-full font-bold mb-4">Add to Library</button>
                <p class="text-xs text-slate-400 text-center uppercase tracking-widest">Instant PDF Download</p>
            </div>
        </section>
    </template>

    <script>
        function navigate(pageId) {
            const view = document.getElementById('view');
            const template = document.getElementById('page-' + pageId);
            if (template) {
                view.innerHTML = '';
                view.appendChild(template.content.cloneNode(true));
                window.location.hash = pageId;
                updateNavLinks(pageId);
                window.scrollTo(0, 0);
            }
            // Close mobile menu on nav
            document.getElementById('mobile-menu').classList.add('hidden');
        }

        function updateNavLinks(pageId) {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.toggle('active-link', link.innerText.toLowerCase() === pageId);
            });
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        window.addEventListener('load', () => {
            const hash = window.location.hash.replace('#', '') || 'home';
            navigate(hash);
        });
    </script>
</body>

</html>
